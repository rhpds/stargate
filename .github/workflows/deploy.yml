name: Deploy to Cluster

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - infra01
      confirm:
        description: "Type 'deploy' to confirm"
        required: true

jobs:
  gate-check:
    name: Pre-deployment Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: summit-demo-factory
    steps:
      - name: Confirm deployment
        run: |
          if [ "${{ inputs.confirm }}" != "deploy" ]; then
            echo "Deployment not confirmed. Type 'deploy' to proceed."
            exit 1
          fi
        working-directory: .

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run full test suite
        run: |
          pip install -e ".[dev,api]"
          python -m pytest tests/ -v --tb=short

      - name: Validate rubrics
        run: |
          python3 -c "
          import yaml
          from pathlib import Path
          rubrics = list(Path('rubrics/platform').glob('*.yaml'))
          for r in rubrics:
              data = yaml.safe_load(r.read_text())
              assert 'id' in data, f'Invalid rubric: {r}'
          print(f'All {len(rubrics)} rubrics valid')
          "

  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: gate-check
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Build and push images
        run: |
          echo "Build + push would happen here"
          echo "Target: ${{ inputs.environment }}"
          echo "This step requires: oc login, registry push access"
          echo "Skipping actual deploy — manual for now"

      - name: Generate deployment receipt
        run: |
          python3 -c "
          import json, uuid, subprocess
          from datetime import datetime
          commit = subprocess.check_output(['git', 'rev-parse', '--short', 'HEAD'], text=True).strip()
          receipt = {
              'deployment_id': str(uuid.uuid4()),
              'timestamp': datetime.utcnow().isoformat() + 'Z',
              'environment': '${{ inputs.environment }}',
              'commit': commit,
              'triggered_by': '${{ github.actor }}',
              'status': 'gate_passed',
              'product': 'stargate',
          }
          print(json.dumps(receipt, indent=2))
          "
