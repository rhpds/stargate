apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: stargate
    app.kubernetes.io/component: scanner
---
# Long-lived token Secret (persists across pod restarts, doesn't expire with session)
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.serviceAccount.name }}-token
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/service-account.name: {{ .Values.serviceAccount.name }}
  labels:
    app.kubernetes.io/part-of: stargate
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: stargate-scanner-cluster-reader
  labels:
    app.kubernetes.io/part-of: stargate
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.clusterRole }}
