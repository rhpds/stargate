apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stargate-postgres-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.postgres.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stargate-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stargate-postgres
  template:
    metadata:
      labels:
        app: stargate-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stargate-secrets
                  key: postgres-password
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database }}
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: "1"
              memory: 2Gi
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: stargate-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: stargate-postgres
spec:
  ports:
    - port: 5432
  selector:
    app: stargate-postgres
