apiVersion: apps/v1
kind: Deployment
metadata:
  name: stargate-worker
  labels:
    app: stargate-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: stargate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stargate-worker
  template:
    metadata:
      labels:
        app: stargate-worker
    spec:
      containers:
        - name: worker
          image: stargate-api:latest
          command: ["celery", "-A", "celery_app", "worker", "--loglevel=info", "--concurrency=2"]
          env:
            - name: CELERY_BROKER_URL
              value: "redis://:ecosystem-redis-2026@redis.ecosystem-redis.svc:6379/0"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stargate-secrets
                  key: postgres-password
            - name: STARGATE_DATABASE_URL
              value: "postgresql://stargate:$(POSTGRES_PASSWORD)@stargate-postgres:5432/stargate"
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          volumeMounts:
            - name: scan-history
              mountPath: /opt/app-root/src/scan-history
            - name: kubeconfigs
              mountPath: /opt/app-root/src/secrets
              readOnly: true
      volumes:
        - name: scan-history
          persistentVolumeClaim:
            claimName: stargate-scan-history-pvc
        - name: kubeconfigs
          secret:
            secretName: stargate-kubeconfigs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stargate-beat
  labels:
    app: stargate-beat
    app.kubernetes.io/component: beat
    app.kubernetes.io/part-of: stargate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stargate-beat
  template:
    metadata:
      labels:
        app: stargate-beat
    spec:
      containers:
        - name: beat
          image: stargate-api:latest
          command: ["celery", "-A", "celery_app", "beat", "--loglevel=info"]
          env:
            - name: CELERY_BROKER_URL
              value: "redis://:ecosystem-redis-2026@redis.ecosystem-redis.svc:6379/0"
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 200m
