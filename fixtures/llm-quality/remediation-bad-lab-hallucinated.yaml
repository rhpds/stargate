  This appears to be a new issue. We have not seen this pattern before across any of our monitored environments.

  ## Remediation Steps

  **Step 1 — Check the pods on sandbox-fake-cluster:**
  ```
  oc get pods -n lb9999-workshop
  oc describe pod workshop-api-7f8g9h0j1-abc123 -n lb9999-workshop
  ```

  **Step 2 — Restart the affected deployments:**
  ```
  oc rollout restart deployment/workshop-frontend -n lb9999-workshop
  oc rollout restart deployment/workshop-backend -n lb9999-workshop
  ```

  **Step 3 — If the issue persists on sandbox-x9y8z-prodcluster, also check:**
  ```
  oc get nodes --selector=node-role.kubernetes.io/worker
  oc adm top nodes
  ```

  ## Verification Steps

  Confirm pods are running:
  ```
  oc get pods -n lb9999-workshop -w
  ```

