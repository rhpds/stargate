response: |
  ## Readiness Assessment

  **Status: AT-RISK** — Lab LB0117 on cluster sandbox-r3t5w-ocpv12 has 2 of 4 pods in NotReady state. Readiness is at 50%. The health trend is STABLE, meaning the situation is not actively worsening, but the lab is not functional at this readiness level.

  ## New vs. Recurring Analysis

  **No historical data is available** for this lab or cluster. Without prior incident records, this is treated as a new issue. There are no historical patterns to reference for root cause correlation.

  ## Remediation Steps

  Since there is no node-level resource pressure (cluster memory at 62%, all nodes Ready), the issue is likely application-level.

  **Priority 1 — Diagnose pod failures:**
  ```
  oc describe pod demo-app-5c7d8e9f0-vw2xy -n lb0117-demo
  oc describe pod demo-worker-3a4b5c6d7-gh8jk -n lb0117-demo
  oc logs demo-app-5c7d8e9f0-vw2xy -n lb0117-demo --previous
  oc logs demo-worker-3a4b5c6d7-gh8jk -n lb0117-demo --previous
  ```

  **Priority 2 — Check for configuration issues:**
  ```
  oc get events -n lb0117-demo --sort-by=.lastTimestamp | tail -20
  oc get configmaps -n lb0117-demo
  oc get secrets -n lb0117-demo
  ```

  **Priority 3 — Restart pods if logs indicate transient failure:**
  ```
  oc delete pod demo-app-5c7d8e9f0-vw2xy -n lb0117-demo
  oc delete pod demo-worker-3a4b5c6d7-gh8jk -n lb0117-demo
  ```

  ## Verification Steps

  Confirm recovery after remediation:
  ```
  oc get pods -n lb0117-demo -o wide
  oc wait --for=condition=Ready pod -l app=demo-app -n lb0117-demo --timeout=120s
  ```

  ## Systemic Assessment

  **Scope: Namespace-level.** No cluster-wide resource pressure is detected. The issue appears isolated to the lb0117-demo namespace. Other labs on sandbox-r3t5w-ocpv12 are unlikely to be affected.

