    Lab LB0117 on cluster sandbox-r3t5w-ocpv12 is experiencing pods_not_ready failure.
    2 of 4 pods in namespace lb0117-demo are in NotReady state since 2026-07-07T09:10:00Z.
    Health trend: STABLE (pods have been NotReady for 45 minutes with no further change).
    Current readiness: 50%.
    Affected pods: demo-app-5c7d8e9f0-vw2xy, demo-worker-3a4b5c6d7-gh8jk.
