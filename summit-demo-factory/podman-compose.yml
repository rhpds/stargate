version: "3"
services:
  db:
    image: registry.redhat.io/rhel9/postgresql-15:latest
    environment:
      POSTGRESQL_USER: sdf
      POSTGRESQL_PASSWORD: REDACTED
      POSTGRESQL_DATABASE: summit_demo_factory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/pgsql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdf -d summit_demo_factory"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Containerfile
    environment:
      DATABASE_URL: "postgresql://sdf:REDACTED@db:5432/summit_demo_factory"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
