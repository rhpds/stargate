apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: summit-demo-factory
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: summit-demo-factory:dev
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
