- id: inspect_service_selector_and_pod_labels
  risk: low
  mode: recommend_only
  scope: namespace
  requires_approval: false
  allowed_when:
    - failure_class == service_has_no_endpoints
  commands:
    - "oc get svc {service} -n {namespace} -o yaml"
    - "oc get pods -n {namespace} --show-labels"
  forbidden_when:
    - "namespace == openshift-*"

- id: inspect_pod_status
  risk: low
  mode: recommend_only
  scope: namespace
  requires_approval: false
  allowed_when:
    - failure_class == pods_not_ready
  commands:
    - "oc get pods -n {namespace} -o wide"
    - "oc describe pods -n {namespace}"
  forbidden_when:
    - "namespace == openshift-*"

- id: inspect_pod_logs
  risk: low
  mode: recommend_only
  scope: namespace
  requires_approval: false
  allowed_when:
    - failure_class == pods_crashlooping
  commands:
    - "oc logs -n {namespace} --previous {pod}"
    - "oc get events -n {namespace} --sort-by=.lastTimestamp"
  forbidden_when:
    - "namespace == openshift-*"

- id: inspect_application_health
  risk: low
  mode: recommend_only
  scope: namespace
  requires_approval: false
  allowed_when:
    - failure_class == health_check_failed
  commands:
    - "curl -s -o /dev/null -w '%{http_code}' {route_url}/health"
    - "oc logs -n {namespace} {pod} --tail=50"
  forbidden_when:
    - "namespace == openshift-*"

- id: inspect_application_logs
  risk: low
  mode: recommend_only
  scope: namespace
  requires_approval: false
  allowed_when:
    - failure_class == smoke_test_failed
  commands:
    - "oc logs -n {namespace} {pod} --tail=100"
  forbidden_when:
    - "namespace == openshift-*"

- id: create_namespace
  risk: low
  mode: recommend_only
  scope: namespace
  requires_approval: true
  allowed_when:
    - failure_class == namespace_missing
  commands:
    - "oc new-project {namespace}"
  forbidden_when:
    - "namespace == openshift-*"

- id: check_deployment_manifest
  risk: low
  mode: recommend_only
  scope: namespace
  requires_approval: false
  allowed_when:
    - failure_class == deployment_missing
  commands:
    - "oc get deployment -n {namespace} -o yaml"
    - "ls deploy/openshift/"
  forbidden_when:
    - "namespace == openshift-*"

- id: check_route_manifest
  risk: low
  mode: recommend_only
  scope: namespace
  requires_approval: false
  allowed_when:
    - failure_class == route_missing
  commands:
    - "oc get route -n {namespace} -o yaml"
    - "oc get svc -n {namespace}"
  forbidden_when:
    - "namespace == openshift-*"

- id: inspect_application_output
  risk: low
  mode: recommend_only
  scope: namespace
  requires_approval: false
  allowed_when:
    - failure_class == unexpected_response
  commands:
    - "curl -s {route_url}/"
    - "oc logs -n {namespace} {pod} --tail=50"
  forbidden_when:
    - "namespace == openshift-*"

